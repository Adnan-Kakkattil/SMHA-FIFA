<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SMHA FIFA Bidding Velocity</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #0f141a;
        --panel: rgba(255, 255, 255, 0.055);
        --line: rgba(255, 255, 255, 0.12);
        --text: #ffffff;
        --muted: rgba(255, 255, 255, 0.46);
        --primary: #0096ff;
        --secondary: #00c853;
        --tertiary: #ff5252;
        --gold: #ffda37;
    }

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background:
            radial-gradient(circle at 50% -18%, rgba(0, 150, 255, 0.2), transparent 42%),
            radial-gradient(circle at 12% 35%, rgba(0, 200, 83, 0.13), transparent 34%),
            radial-gradient(circle at 94% 72%, rgba(255, 82, 82, 0.12), transparent 34%),
            #0f141a;
        color: var(--text);
        font-family: "Plus Jakarta Sans", sans-serif;
    }

    body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.026) 0 1px, transparent 1px 16px);
        opacity: 0.75;
    }

    .floating-logo {
        position: fixed;
        top: 22px;
        left: 34px;
        z-index: 10;
        width: auto;
        height: clamp(48px, 5vw, 84px);
        object-fit: contain;
        filter: drop-shadow(0 0 28px rgba(0, 150, 255, 0.38));
    }

    .page {
        position: relative;
        z-index: 1;
        display: grid;
        width: 100%;
        height: 100%;
        padding: clamp(82px, 8vh, 122px) clamp(28px, 4vw, 70px) clamp(28px, 4vh, 56px);
    }

    .velocity-board {
        position: relative;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: clamp(22px, 3vh, 42px);
        min-height: 0;
        padding: clamp(28px, 4vw, 62px);
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: clamp(28px, 3vw, 48px);
        background:
            linear-gradient(145deg, rgba(255, 255, 255, 0.085), rgba(255, 255, 255, 0.025)),
            var(--panel);
        box-shadow: 0 28px 90px rgba(0, 0, 0, 0.48), inset 0 1px 0 rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(24px);
    }

    .velocity-board::before {
        content: "";
        position: absolute;
        inset: -40%;
        pointer-events: none;
        background: linear-gradient(110deg, transparent 40%, rgba(0, 150, 255, 0.1) 50%, transparent 60%);
        animation: boardSweep 6s ease-in-out infinite;
    }

    .header {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 30px;
    }

    h1 {
        margin: 0;
        font-family: "Sora", sans-serif;
        font-size: clamp(40px, 5.8vw, 102px);
        font-weight: 800;
        line-height: 0.95;
        text-transform: uppercase;
    }

    .subtitle {
        margin: 12px 0 0;
        color: var(--muted);
        font-family: "Space Grotesk", sans-serif;
        font-size: clamp(13px, 1.25vw, 22px);
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
    }

    .live-count {
        min-width: clamp(190px, 18vw, 320px);
        padding: clamp(16px, 1.6vw, 26px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.05);
        text-align: right;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }

    .live-count span {
        display: block;
        color: var(--muted);
        font-family: "Space Grotesk", sans-serif;
        font-size: clamp(11px, 0.95vw, 16px);
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
    }

    .live-count strong {
        display: block;
        margin-top: 8px;
        color: var(--secondary);
        font-family: "Sora", sans-serif;
        font-size: clamp(34px, 4.6vw, 82px);
        line-height: 1;
        text-shadow: 0 0 26px rgba(0, 200, 83, 0.44);
    }

    .chart-shell {
        position: relative;
        z-index: 1;
        min-height: 0;
        display: grid;
        grid-template-rows: 1fr auto;
        gap: clamp(14px, 2vh, 26px);
    }

    .chart-grid {
        position: relative;
        display: grid;
        grid-template-columns: repeat(7, minmax(76px, 1fr));
        align-items: end;
        gap: clamp(22px, 4vw, 72px);
        min-height: 0;
        padding: 0 clamp(8px, 2vw, 36px);
    }

    .chart-grid::before,
    .chart-grid::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .chart-grid::before {
        top: 31%;
    }

    .chart-grid::after {
        top: 62%;
    }

    .bar-group {
        position: relative;
        display: grid;
        align-items: end;
        height: 100%;
        min-height: 0;
    }

    .bar {
        position: relative;
        width: min(100%, clamp(66px, 7vw, 128px));
        height: var(--h);
        min-height: 7%;
        justify-self: center;
        border-radius: 999px 999px 10px 10px;
        background: linear-gradient(to top, rgba(0, 150, 255, 0.18), var(--primary));
        box-shadow: 0 0 24px rgba(0, 150, 255, 0.3);
        transition: height 850ms cubic-bezier(0.2, 0, 0, 1), filter 850ms cubic-bezier(0.2, 0, 0, 1);
        animation: barEnter 900ms cubic-bezier(0.2, 0, 0, 1) both;
    }

    .bar::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: linear-gradient(to right, rgba(255, 255, 255, 0.2), transparent 30%, rgba(255, 255, 255, 0.18));
        opacity: 0.75;
    }

    .bar.hot {
        background: linear-gradient(to top, rgba(0, 200, 83, 0.18), var(--secondary));
        box-shadow: 0 0 34px rgba(0, 200, 83, 0.5);
    }

    .bar.peak {
        background: linear-gradient(to top, rgba(255, 82, 82, 0.2), var(--tertiary));
        box-shadow: 0 0 42px rgba(255, 82, 82, 0.56);
    }

    .labels {
        display: grid;
        grid-template-columns: repeat(7, minmax(76px, 1fr));
        gap: clamp(22px, 4vw, 72px);
        padding: 0 clamp(8px, 2vw, 36px);
        border-top: 1px solid rgba(255, 255, 255, 0.16);
    }

    .labels span {
        padding-top: 14px;
        color: rgba(255, 255, 255, 0.45);
        font-family: "Space Grotesk", sans-serif;
        font-size: clamp(12px, 1vw, 18px);
        font-weight: 700;
        text-align: center;
        text-transform: uppercase;
    }

    .labels .peak-label {
        color: var(--tertiary);
    }

    @keyframes boardSweep {
        0%, 32% { opacity: 0; transform: translateX(-42%) rotate(8deg); }
        52% { opacity: 1; }
        78%, 100% { opacity: 0; transform: translateX(42%) rotate(8deg); }
    }

    @keyframes barEnter {
        from { height: 4%; filter: brightness(1.4); }
        to { height: var(--h); filter: brightness(1); }
    }

    @media (max-width: 900px) {
        body {
            overflow-y: auto;
            height: auto;
            min-height: 100vh;
        }

        .page {
            height: auto;
            min-height: 100vh;
        }

        .header {
            align-items: start;
            flex-direction: column;
        }

        .live-count {
            width: 100%;
            text-align: left;
        }

        .chart-grid,
        .labels {
            gap: 14px;
            grid-template-columns: repeat(7, minmax(42px, 1fr));
        }
    }

    @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
            animation-duration: 1ms !important;
            animation-iteration-count: 1 !important;
            transition-duration: 1ms !important;
        }
    }
</style>
</head>
<body>
<img alt="FIFA World Cup 2026 Logo" class="floating-logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDZlJLsu1-5aC0in-_NJGnXm21WymPK2Bt2RbELvwIM0JloU1umlGbOW-ODtWcxLfLkFnYGM8h0bAD8Wgj43GFiwWgcPqTN_4hPxyNONXIxAByrHPhvbiPlR2BQSLnQ4JrwJRC3Ng7y0BV6L-KfFIOtxR6DKaZ1hX8ESpX50KmRy0UU03nHxSbh8Xncv-OfDCuczVzlCtLYqYmO6op0-yiaIpfp2tDvP_7eK3zy4WVfLSsMEiC7LBWP_fajpckWtQ8XcUxAMdXnwRSG">
<main class="page">
    <section class="velocity-board" aria-label="Bidding velocity dashboard">
        <header class="header">
            <div>
                <h1>Bidding Velocity</h1>
                <p class="subtitle">Real-time engagement analytics</p>
            </div>
            <div class="live-count">
                <span>Live bid volume</span>
                <strong id="liveCount">86%</strong>
            </div>
        </header>
        <div class="chart-shell">
            <div class="chart-grid" id="chartGrid">
                <div class="bar-group"><div class="bar" style="--h: 42%; animation-delay: 40ms;"></div></div>
                <div class="bar-group"><div class="bar" style="--h: 68%; animation-delay: 120ms;"></div></div>
                <div class="bar-group"><div class="bar" style="--h: 58%; animation-delay: 200ms;"></div></div>
                <div class="bar-group"><div class="bar hot" style="--h: 90%; animation-delay: 280ms;"></div></div>
                <div class="bar-group"><div class="bar peak" style="--h: 100%; animation-delay: 360ms;"></div></div>
                <div class="bar-group"><div class="bar" style="--h: 78%; animation-delay: 440ms;"></div></div>
                <div class="bar-group"><div class="bar" style="--h: 64%; animation-delay: 520ms;"></div></div>
            </div>
            <div class="labels">
                <span>09:00</span>
                <span>09:10</span>
                <span>09:20</span>
                <span>09:30</span>
                <span class="peak-label">Peak</span>
                <span>09:50</span>
                <span>10:00</span>
            </div>
        </div>
    </section>
</main>
<script>
    const bars = Array.from(document.querySelectorAll('.bar'));
    const liveCount = document.getElementById('liveCount');
    const base = [42, 68, 58, 90, 100, 78, 64];
    let tick = 0;

    function updateVelocity() {
        tick += 1;
        const values = base.map((value, index) => {
            const wave = Math.sin((tick + index) * 0.72) * 9;
            return Math.max(20, Math.min(100, Math.round(value + wave + (Math.random() * 8 - 4))));
        });
        const peak = Math.max(...values);

        bars.forEach((bar, index) => {
            bar.classList.toggle('peak', values[index] === peak);
            bar.classList.toggle('hot', values[index] >= 86 && values[index] !== peak);
            bar.style.setProperty('--h', `${values[index]}%`);
        });

        liveCount.textContent = `${values[values.length - 1]}%`;
    }

    setInterval(updateVelocity, 3500);
</script>
</body>
</html>
